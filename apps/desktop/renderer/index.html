    <style>
      #root {
        display: grid;
        place-items: center;
      }

      .relay-boot {
        display: flex;
        min-height: 100vh;
        width: 100%;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at top, rgba(59, 130, 246, 0.14), transparent 34%),
          linear-gradient(180deg, #fbfcfe 0%, #f4f7fb 100%);
      }

      .relay-boot-card {
        display: flex;
        width: min(380px, calc(100vw - 48px));
        flex-direction: column;
        align-items: center;
        gap: 12px;
        border: 1px solid rgba(255, 255, 255, 0.9);
        border-radius: 28px;
        padding: 24px 20px;
        text-align: center;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 24px 80px -36px rgba(15, 23, 42, 0.22);
        backdrop-filter: blur(18px);
      }

      .relay-boot-logo {
        width: 64px;
        height: 64px;
        object-fit: contain;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.9);
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 18px 44px -24px rgba(37, 99, 235, 0.55);
      }

      .relay-boot h1 {
        margin: 0;
        font: 700 24px/1.1 "Google Sans", "Google Sans Text", sans-serif;
        color: #162032;
        letter-spacing: -0.02em;
      }

      .relay-boot p {
        margin: 0;
        max-width: 290px;
        font: 500 13px/1.55 "Google Sans Text", "Google Sans", sans-serif;
        color: #5b6475;
      }

      .relay-boot-status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 2px;
        font: 600 11px/1 "Google Sans Text", "Google Sans", sans-serif;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #6b7280;
      }

      .relay-boot-status::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: linear-gradient(180deg, #60a5fa 0%, #2563eb 100%);
        box-shadow: 0 0 0 6px rgba(59, 130, 246, 0.12);
        animation: relay-pulse 1.6s ease-in-out infinite;
      }

      @keyframes relay-pulse {
        0%, 100% { transform: scale(1); opacity: 0.9; }
        50% { transform: scale(1.18); opacity: 1; }
      }
    </style>
